<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoDeployX | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">🚀 AutoDeployX</div>
            <div class="status-badge">System Live</div>
        </header>

        <main class="card">
            <h1>Welcome to AutoDeployX</h1>
            <p>Enter your details to interact with the dynamic pipeline.</p>
            
            <form id="userForm">
                <div class="input-group">
                    <input type="text" id="nameInput" placeholder="Enter your name" required>
                    <button type="submit" id="submitBtn">Submit</button>
                </div>
            </form>

            <div id="responseMessage" class="hidden">
                <p>Hello, <span id="displayName"></span>! Your request is being processed.</p>
            </div>
        </main>

        <footer>
            <p>Managed by <strong>Jatin Kapoor</strong> | DevSecOps Pipeline</p>
        </footer>
    </div>

    <script>
        // Simple Dynamic Logic
        document.getElementById('userForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('nameInput').value;
            document.getElementById('displayName').innerText = name;
            document.getElementById('responseMessage').classList.remove('hidden');
            document.getElementById('nameInput').value = '';
        });
    </script>
</body>
</html>
