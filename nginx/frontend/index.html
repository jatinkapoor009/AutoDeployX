<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AutoDeployX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>🚀 AutoDeployX</h1>
    <p class="subtitle">Automated CI/CD Deployment Platform</p>

```
<div class="card">
  <input type="text" id="name" placeholder="Enter your name" />
  <button onclick="submitName()">Submit</button>
</div>

<p id="response"></p>
```

  </div>

<script>
function submitName() {
    const name = document.getElementById('name').value;

    fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('response').innerText = data.message;
    });
}
</script>

</body>
</html>
